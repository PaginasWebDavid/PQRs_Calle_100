<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#15803d"/>
  <g fill="white">
    <!-- Building -->
    <rect x="6" y="8" width="12" height="18" rx="1"/>
    <!-- Windows row 1 -->
    <rect x="8" y="10" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <rect x="13" y="10" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <!-- Windows row 2 -->
    <rect x="8" y="14.5" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <rect x="13" y="14.5" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <!-- Windows row 3 -->
    <rect x="8" y="19" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <rect x="13" y="19" width="3" height="2.5" rx="0.5" fill="#15803d"/>
    <!-- Door -->
    <rect x="10" y="23" width="4" height="3" rx="0.5" fill="#15803d"/>
    <!-- Chat bubble (PQRS) -->
    <rect x="18" y="6" width="10" height="8" rx="2"/>
    <polygon points="20,14 22,17 24,14" fill="white"/>
    <!-- PQ text -->
    <text x="23" y="12.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#15803d">PQ</text>
  </g>
</svg>
